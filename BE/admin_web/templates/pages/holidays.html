<!-- BE/admin_web/templates/pages/holidays.html -->
{{ define "holidays_content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Manajemen Hari Libur</h2>
        <button class="login-btn" style="width: auto; padding: 12px 20px; font-size: 14px; display: flex; align-items: center; gap: 8px;" onclick="openCreateModal()">
            <i class='bx bx-plus'></i> Tambah Hari Libur
        </button>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">TANGGAL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KETERANGAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="holiday-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <i class='bx bx-calendar-x' style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"></i>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada hari libur yang terdaftar.</div>
    </div>
</div>

<!-- Modal Create/Edit Libur -->
<div id="holiday-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <form id="holiday-form" class="stat-card" style="width: 100%; max-width: 400px; padding: 32px;">
        <h3 id="modal-title" style="font-weight: 800; margin-bottom: 24px;">Tambah Hari Libur</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label class="form-label">Tanggal</label>
            <input type="date" id="holiday-date" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Keterangan</label>
            <input type="text" id="holiday-desc" class="form-input" placeholder="Contoh: Idul Fitri, Tahun Baru, dll" required>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="button" class="login-btn" style="background: #F1F5F9; color: var(--primary-dark); box-shadow: none;" onclick="closeModal()">Batal</button>
            <button type="submit" class="login-btn">Simpan</button>
        </div>
    </form>
</div>
{{ end }}

{{ define "holidays_scripts" }}
<script>
    async function loadHolidays() {
        try {
            const data = await api.get('/admin/holidays');
            renderTable(data);
        } catch (error) { console.error(error); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('holiday-table-body');
        const noData = document.getElementById('no-data');

        if (!data || data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(p => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px; font-weight: 700; color: var(--primary-color);">
                    ${new Date(p.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}
                </td>
                <td style="padding: 16px; font-weight: 600; color: var(--primary-dark);">${p.name}</td>
                <td style="padding: 16px;">
                    <div style="display: flex; gap: 8px;">
                        <button onclick="openEditModal('${p.id}', '${p.date}', '${p.name}')" title="Edit" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #EEF2FF; color: #4D64F5; cursor: pointer;"><i class='bx bx-edit-alt'></i></button>
                        <button onclick="deleteHoliday('${p.id}')" title="Hapus" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #FEF2F2; color: #EF4444; cursor: pointer;"><i class='bx bx-trash'></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function openCreateModal() {
        document.getElementById('modal-title').textContent = 'Tambah Hari Libur';
        document.getElementById('edit-id').value = '';
        document.getElementById('holiday-date').value = '';
        document.getElementById('holiday-desc').value = '';
        document.getElementById('holiday-modal').style.display = 'flex';
    }

    function openEditModal(id, date, name) {
        document.getElementById('modal-title').textContent = 'Edit Hari Libur';
        document.getElementById('edit-id').value = id;
        document.getElementById('holiday-date').value = date.substring(0, 10);
        document.getElementById('holiday-desc').value = name;
        document.getElementById('holiday-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('holiday-modal').style.display = 'none';
    }

    document.getElementById('holiday-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const date = document.getElementById('holiday-date').value;
        const name = document.getElementById('holiday-desc').value;
        
        try {
            if (id) {
                await api.put(`/admin/holidays/${id}`, { date, name });
                alert('Hari libur diperbarui!');
            } else {
                await api.post('/admin/holidays', { date, name });
                alert('Hari libur ditambahkan!');
            }
            closeModal();
            loadHolidays();
        } catch (error) { alert(error.message); }
    });

    async function deleteHoliday(id) {
        if (!confirm('Hapus hari libur ini?')) return;
        try {
            await api.delete(`/admin/holidays/${id}`);
            alert('Hari libur dihapus!');
            loadHolidays();
        } catch (error) { alert(error.message); }
    }

    document.addEventListener('DOMContentLoaded', loadHolidays);
</script>
{{ end }}

{{ template "base" . }}
