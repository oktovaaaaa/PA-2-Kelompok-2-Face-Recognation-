<!-- BE/admin_web/templates/pages/positions.html -->
{{ define "content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Manajemen Jabatan</h2>
        <button class="login-btn" style="width: auto; padding: 12px 20px; font-size: 14px; display: flex; align-items: center; gap: 8px;" onclick="openCreateModal()">
            <i class='bx bx-plus'></i> Tambah Jabatan
        </button>
    </div>

    <div style="position: relative; margin-bottom: 24px;">
        <i class='bx bx-search' style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94A3B8;"></i>
        <input type="text" id="position-search" class="form-input" placeholder="Cari nama jabatan..." style="padding-left: 40px; margin-bottom: 0; width: 100%; max-width: 400px;">
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">NAMA JABATAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">ID</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="position-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Create/Edit Jabatan -->
<div id="position-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <form id="position-form" class="stat-card" style="width: 100%; max-width: 400px; padding: 32px;">
        <h3 id="modal-title" style="font-weight: 800; margin-bottom: 24px;">Tambah Jabatan</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label class="form-label">Nama Jabatan</label>
            <input type="text" id="position-name" class="form-input" placeholder="Contoh: Manager, Staff, dll" required>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="button" class="login-btn" style="background: #F1F5F9; color: var(--primary-dark); box-shadow: none;" onclick="closeModal()">Batal</button>
            <button type="submit" class="login-btn">Simpan</button>
        </div>
    </form>
</div>
{{ end }}

{{ define "scripts" }}
<script>
    let positions = [];

    async function loadPositions() {
        try {
            positions = await api.get('/admin/positions');
            renderTable();
        } catch (error) { console.error(error); }
    }

    function renderTable(filter = '') {
        const tbody = document.getElementById('position-table-body');
        const filtered = positions.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
        
        tbody.innerHTML = filtered.map(p => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px; font-weight: 700; color: var(--primary-dark);">${p.name}</td>
                <td style="padding: 16px; font-family: monospace; font-size: 13px; color: #94A3B8;">${p.id}</td>
                <td style="padding: 16px;">
                    <div style="display: flex; gap: 8px;">
                        <button onclick="openEditModal('${p.id}', '${p.name}')" title="Edit" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #EEF2FF; color: #4D64F5; cursor: pointer;"><i class='bx bx-edit-alt'></i></button>
                        <button onclick="deletePosition('${p.id}')" title="Hapus" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #FEF2F2; color: #EF4444; cursor: pointer;"><i class='bx bx-trash'></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function openCreateModal() {
        document.getElementById('modal-title').textContent = 'Tambah Jabatan';
        document.getElementById('edit-id').value = '';
        document.getElementById('position-name').value = '';
        document.getElementById('position-modal').style.display = 'flex';
    }

    function openEditModal(id, name) {
        document.getElementById('modal-title').textContent = 'Edit Jabatan';
        document.getElementById('edit-id').value = id;
        document.getElementById('position-name').value = name;
        document.getElementById('position-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('position-modal').style.display = 'none';
    }

    document.getElementById('position-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('position-name').value;
        
        try {
            if (id) {
                await api.put(`/admin/positions/${id}`, { name });
                alert('Jabatan diperbarui!');
            } else {
                await api.post('/admin/positions', { name });
                alert('Jabatan berhasil ditambahkan!');
            }
            closeModal();
            loadPositions();
        } catch (error) { alert(error.message); }
    });

    async function deletePosition(id) {
        if (!confirm('Hapus jabatan ini? Karyawan dengan jabatan ini akan kehilangan jabatannya.')) return;
        try {
            await api.delete(`/admin/positions/${id}`);
            alert('Jabatan berhasil dihapus!');
            loadPositions();
        } catch (error) { alert(error.message); }
    }

    document.getElementById('position-search').addEventListener('input', (e) => {
        renderTable(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', loadPositions);
</script>
{{ end }}

{{ template "base" . }}
