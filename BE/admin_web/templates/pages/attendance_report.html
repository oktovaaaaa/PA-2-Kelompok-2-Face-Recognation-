<!-- BE/admin_web/templates/pages/attendance_report.html -->
{{ define "content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Laporan Kehadiran</h2>
        <div style="display: flex; gap: 12px;">
            <button id="delete-selected" class="login-btn" style="background: #FEE2E2; color: #EF4444; width: auto; padding: 10px 20px; font-size: 14px; display: none;" onclick="deleteSelected()">
                <i class='bx bx-trash'></i> Hapus Terpilih (<span id="selected-count">0</span>)
            </button>
            <button class="login-btn" style="background: #10B981; width: auto; padding: 10px 20px; font-size: 14px; display: flex; align-items: center; gap: 8px;" onclick="exportToExcel()">
                <i class='bx bxs-file-export'></i> Ekspor Excel
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; background: #F8FAFC; padding: 20px; border-radius: 16px;">
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Cari Nama</label>
            <input type="text" id="filter-name" class="form-input" placeholder="Nama karyawan...">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Tanggal</label>
            <input type="date" id="filter-date" class="form-input">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Status</label>
            <select id="filter-status" class="form-input">
                <option value="">Semua Status</option>
                <option value="PRESENT">Hadir Tepat Waktu</option>
                <option value="LATE">Terlambat</option>
                <option value="ABSENT">Alpha</option>
                <option value="LEAVE">Izin</option>
                <option value="SICK">Sakit</option>
                <option value="EARLY_LEAVE">Pulang Awal</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; width: 50px;">
                        <input type="checkbox" id="select-all" onclick="toggleSelectAll()">
                    </th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">TANGGAL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">JAM MASUK</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">JAM KELUAR</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">STATUS</th>
                </tr>
            </thead>
            <tbody id="attendance-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <i class='bx bx-search' style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"></i>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada data yang ditemukan.</div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
    let attendance = [];
    let selectedIds = new Set();

    async function loadAttendance() {
        try {
            attendance = await api.get('/admin/attendance');
            applyFilters();
        } catch (error) { console.error(error); }
    }

    function applyFilters() {
        const name = document.getElementById('filter-name').value.toLowerCase();
        const date = document.getElementById('filter-date').value;
        const status = document.getElementById('filter-status').value;

        const filtered = attendance.filter(item => {
            const matchesName = (item.user_name || '').toLowerCase().includes(name);
            const matchesDate = !date || item.date === date;
            const matchesStatus = !status || item.status === status;
            return matchesName && matchesDate && matchesStatus;
        });

        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('attendance-table-body');
        const noData = document.getElementById('no-data');

        if (data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(item => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px;">
                    <input type="checkbox" value="${item.id}" onchange="toggleSelect('${item.id}')" ${selectedIds.has(item.id) ? 'checked' : ''}>
                </td>
                <td style="padding: 16px; font-weight: 700; color: var(--primary-dark);">${item.user_name}</td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #64748B;">${formatDate(item.date)}</td>
                <td style="padding: 16px; font-weight: 600; font-size: 14px;">${formatTime(item.check_in_time)}</td>
                <td style="padding: 16px; font-weight: 600; font-size: 14px;">${formatTime(item.check_out_time)}</td>
                <td style="padding: 16px;">
                    <span style="padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 800; ${getStatusStyle(item.status)}">
                        ${translateStatus(item.status)}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatTime(timeStr) {
        if (!timeStr) return '-';
        return timeStr.substring(11, 16);
    }

    function translateStatus(status) {
        const map = {
            'PRESENT': 'Hadir Tepat Waktu',
            'LATE': 'Terlambat',
            'ABSENT': 'Alpha',
            'LEAVE': 'Izin',
            'SICK': 'Sakit',
            'EARLY_LEAVE': 'Pulang Awal',
            'WORKING': 'Sedang Bekerja'
        };
        return map[status] || status;
    }

    function getStatusStyle(status) {
        if (status === 'PRESENT' || status === 'WORKING') return 'background: #F0FDF4; color: #10B981;';
        if (status === 'LATE' || status === 'EARLY_LEAVE') return 'background: #FFFBEB; color: #F59E0B;';
        if (status === 'ABSENT') return 'background: #FEF2F2; color: #EF4444;';
        return 'background: #F1F5F9; color: #64748B;';
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        updateBatchButton();
    }

    function toggleSelectAll() {
        const checkAll = document.getElementById('select-all');
        const checkboxes = document.querySelectorAll('#attendance-table-body input[type="checkbox"]');
        
        if (checkAll.checked) {
            checkboxes.forEach(cb => {
                selectedIds.add(cb.value);
                cb.checked = true;
            });
        } else {
            checkboxes.forEach(cb => {
                selectedIds.delete(cb.value);
                cb.checked = false;
            });
        }
        updateBatchButton();
    }

    function updateBatchButton() {
        const btn = document.getElementById('delete-selected');
        const count = document.getElementById('selected-count');
        count.textContent = selectedIds.size;
        btn.style.display = selectedIds.size > 0 ? 'flex' : 'none';
    }

    async function deleteSelected() {
        if (!confirm(`Hapus ${selectedIds.size} data kehadiran terpilih?`)) return;
        
        try {
            await api.request('/admin/attendance', {
                method: 'DELETE',
                body: JSON.stringify({ ids: Array.from(selectedIds) })
            });
            alert('Data berhasil dihapus!');
            selectedIds.clear();
            updateBatchButton();
            loadAttendance();
        } catch (error) { alert(error.message); }
    }

    function exportToExcel() {
        const name = document.getElementById('filter-name').value;
        const date = document.getElementById('filter-date').value;
        const status = document.getElementById('filter-status').value;

        const data = attendance.filter(item => {
            const matchesName = (item.user_name || '').toLowerCase().includes(name.toLowerCase());
            const matchesDate = !date || item.date === date;
            const matchesStatus = !status || item.status === status;
            return matchesName && matchesDate && matchesStatus;
        });

        const rows = data.map((item, index) => ({
            'No': index + 1,
            'Nama Karyawan': item.user_name,
            'Tanggal': item.date,
            'Masuk': formatTime(item.check_in_time),
            'Keluar': formatTime(item.check_out_time),
            'Status': translateStatus(item.status)
        }));

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Kehadiran');
        
        const fileName = `Laporan_Kehadiran_${new Date().toISOString().substring(0,10)}.xlsx`;
        XLSX.writeFile(workbook, fileName);
    }

    document.getElementById('filter-name').addEventListener('input', applyFilters);
    document.getElementById('filter-date').addEventListener('change', applyFilters);
    document.getElementById('filter-status').addEventListener('change', applyFilters);

    document.addEventListener('DOMContentLoaded', loadAttendance);
</script>
{{ end }}

{{ template "base" . }}
