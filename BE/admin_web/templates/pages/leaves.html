<!-- BE/admin_web/templates/pages/leaves.html -->
{{ define "content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Manajemen Perizinan</h2>
        <div style="display: flex; gap: 12px;">
            <select id="filter-status" class="form-input" style="margin-bottom: 0; min-width: 150px;">
                <option value="PENDING">Menunggu</option>
                <option value="APPROVED">Disetujui</option>
                <option value="REJECTED">Ditolak</option>
                <option value="">Semua</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">JENIS & ALASAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">TANGGAL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">LAMPIRAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">STATUS</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="leaves-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <i class='bx bx-edit' style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"></i>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada pengajuan izin yang ditemukan.</div>
    </div>
</div>

<!-- Lightbox for Image -->
<div id="lightbox" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 40px;" onclick="closeLightbox()">
    <img id="lightbox-img" style="max-width: 100%; max-height: 100%; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
</div>
{{ end }}

{{ define "scripts" }}
<script>
    async function loadLeaves() {
        const status = document.getElementById('filter-status').value;
        try {
            const data = await api.get(`/admin/leaves?status=${status}`);
            renderTable(data);
        } catch (error) { console.error(error); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('leaves-table-body');
        const noData = document.getElementById('no-data');

        if (!data || data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(item => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px;">
                    <div style="font-weight: 700; color: var(--primary-dark);">${item.user_name}</div>
                    <div style="font-size: 12px; color: #94A3B8;">${item.user_email}</div>
                </td>
                <td style="padding: 16px;">
                    <div style="padding: 2px 8px; background: #F1F5F9; border-radius: 6px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 4px;">${item.type}</div>
                    <div style="font-size: 13px; color: #64748B; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.reason}">${item.reason}</div>
                </td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #64748B;">
                    ${formatDate(item.start_date)} ${item.end_date && item.end_date !== item.start_date ? ' s/d ' + formatDate(item.end_date) : ''}
                </td>
                <td style="padding: 16px;">
                    ${item.attachment_url ? `
                        <div onclick="openLightbox('/uploads/${item.attachment_url}')" style="width: 60px; height: 40px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #E2E8F0;">
                            <img src="/uploads/${item.attachment_url}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    ` : '<span style="color: #CBD5E1; font-size: 12px;">Tanpa Lampiran</span>'}
                </td>
                <td style="padding: 16px;">
                    <span style="padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; ${getStatusStyle(item.status)}">
                        ${translateStatus(item.status)}
                    </span>
                </td>
                <td style="padding: 16px;">
                    ${item.status === 'PENDING' ? `
                        <div style="display: flex; gap: 8px;">
                            <button onclick="approve('${item.id}')" title="Approve" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #DCFCE7; color: #16A34A; cursor: pointer;"><i class='bx bx-check'></i></button>
                            <button onclick="reject('${item.id}')" title="Reject" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #FEE2E2; color: #EF4444; cursor: pointer;"><i class='bx bx-x'></i></button>
                        </div>
                    ` : '<span style="color: #94A3B8; font-size: 12px;">Selesai</span>'}
                </td>
            </tr>
        `).join('');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
    }

    function translateStatus(status) {
        const map = { 'PENDING': 'Menunggu', 'APPROVED': 'Disetujui', 'REJECTED': 'Ditolak' };
        return map[status] || status;
    }

    function getStatusStyle(status) {
        if (status === 'APPROVED') return 'background: #F0FDF4; color: #10B981;';
        if (status === 'REJECTED') return 'background: #FEF2F2; color: #EF4444;';
        return 'background: #FFFBEB; color: #F59E0B;';
    }

    async function approve(id) {
        if (!confirm('Setujui perizinan ini?')) return;
        try {
            await api.put(`/admin/leaves/${id}/approve`, {});
            alert('Izin telah disetujui!');
            loadLeaves();
        } catch (error) { alert(error.message); }
    }

    async function reject(id) {
        if (!confirm('Tolak perizinan ini?')) return;
        try {
            await api.put(`/admin/leaves/${id}/reject`, {});
            alert('Izin telah ditolak!');
            loadLeaves();
        } catch (error) { alert(error.message); }
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    document.getElementById('filter-status').addEventListener('change', loadLeaves);
    document.addEventListener('DOMContentLoaded', loadLeaves);
</script>
{{ end }}

{{ template "base" . }}
