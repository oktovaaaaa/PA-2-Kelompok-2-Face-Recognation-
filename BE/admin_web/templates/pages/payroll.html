<!-- BE/admin_web/templates/pages/payroll.html -->
{{ define "content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Manajemen Gaji (Payroll)</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
            <label class="form-label" style="margin-bottom: 0;">Periode:</label>
            <select id="filter-month" class="form-input" style="margin-bottom: 0; min-width: 120px;">
                <option value="1">Januari</option>
                <option value="2">Februari</option>
                <option value="3">Maret</option>
                <option value="4">April</option>
                <option value="5">Mei</option>
                <option value="6">Juni</option>
                <option value="7">Juli</option>
                <option value="8">Agustus</option>
                <option value="9">September</option>
                <option value="10">Oktober</option>
                <option value="11">November</option>
                <option value="12">Desember</option>
            </select>
            <select id="filter-year" class="form-input" style="margin-bottom: 0; min-width: 100px;">
                <!-- Years will be loaded here -->
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">GAJI POKOK</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">DIBAYAR</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">STATUS</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="payroll-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <i class='bx bx-money-withdraw' style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"></i>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada data gaji untuk periode ini.</div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
    const currentMonth = new Date().getMonth() + 1;
    const currentYear = new Date().getFullYear();

    async function loadPayroll() {
        const month = document.getElementById('filter-month').value;
        const year = document.getElementById('filter-year').value;
        
        try {
            const data = await api.get(`/admin/payroll?month=${month}&year=${year}`);
            renderTable(data);
        } catch (error) { console.error(error); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('payroll-table-body');
        const noData = document.getElementById('no-data');

        if (!data || data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(item => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px;">
                    <div style="font-weight: 700; color: var(--primary-dark);">${item.user_name}</div>
                    <div style="font-size: 11px; font-weight: 800; color: #94A3B8;">${item.position_name}</div>
                </td>
                <td style="padding: 16px; font-weight: 800; color: var(--primary-dark);">
                    IDR ${new Intl.NumberFormat('id-ID').format(item.base_salary)}
                </td>
                <td style="padding: 16px; font-weight: 800; color: #10B981;">
                    IDR ${new Intl.NumberFormat('id-ID').format(item.amount_paid)}
                </td>
                <td style="padding: 16px;">
                    <span style="padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; ${getStatusStyle(item.payment_status)}">
                        ${translateStatus(item.payment_status)}
                    </span>
                </td>
                <td style="padding: 16px;">
                    ${item.payment_status !== 'PAID' ? `
                        <button onclick="paySalary('${item.id}')" style="background: var(--primary-color); color: white; border: none; border-radius: 10px; padding: 8px 16px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <i class='bx bx-check-circle'></i> Bayar Gaji
                        </button>
                    ` : '<span style="color: #10B981; font-weight: 800; font-size: 12px;"><i class="bx bxs-check-circle"></i> Selesai</span>'}
                </td>
            </tr>
        `).join('');
    }

    function translateStatus(status) {
        const map = { 'PAID': 'Sudah Dibayar', 'PARTIAL': 'Belum Lunas', 'UNPAID': 'Belum Dibayar' };
        return map[status] || status;
    }

    function getStatusStyle(status) {
        if (status === 'PAID') return 'background: #DCFCE7; color: #16A34A;';
        if (status === 'PARTIAL') return 'background: #FFFBEB; color: #D97706;';
        return 'background: #FEF2F2; color: #EF4444;';
    }

    async function paySalary(salaryId) {
        if (!confirm('Tandai gaji ini sebagai sudah dibayar?')) return;
        try {
            await api.post(`/admin/payroll/${salaryId}/pay`, {});
            alert('Gaji berhasil dibayar!');
            loadPayroll();
        } catch (error) { alert(error.message); }
    }

    function initFilters() {
        const yearSelect = document.getElementById('filter-year');
        const monthSelect = document.getElementById('filter-month');
        
        // Fill years
        for (let i = 0; i < 5; i++) {
            const yr = currentYear - i;
            const opt = document.createElement('option');
            opt.value = yr;
            opt.textContent = yr;
            yearSelect.appendChild(opt);
        }

        monthSelect.value = currentMonth;
        yearSelect.value = currentYear;

        monthSelect.addEventListener('change', loadPayroll);
        yearSelect.addEventListener('change', loadPayroll);
    }

    document.addEventListener('DOMContentLoaded', () => {
        initFilters();
        loadPayroll();
    });
</script>
{{ end }}

{{ template "base" . }}
