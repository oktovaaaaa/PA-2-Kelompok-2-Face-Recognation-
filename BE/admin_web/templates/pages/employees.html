<!-- BE/admin_web/templates/pages/employees.html -->
{{ define "employees_content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Daftar Karyawan</h2>
        <div style="display: flex; gap: 12px;">
            <div style="position: relative;">
                <i class='bx bx-search' style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94A3B8;"></i>
                <input type="text" id="employee-search" class="form-input" placeholder="Cari nama karyawan..." style="padding-left: 40px; margin-bottom: 0; min-width: 300px;">
            </div>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">JABATAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">EMAIL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">STATUS</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="employee-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Set Jabatan -->
<div id="position-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div class="stat-card" style="width: 100%; max-width: 400px; padding: 32px;">
        <h3 style="font-weight: 800; margin-bottom: 24px;">Atur Jabatan</h3>
        <input type="hidden" id="target-user-id">
        <div class="form-group">
            <label class="form-label">Pilih Jabatan</label>
            <select id="position-select" class="form-input">
                <!-- Positions will be loaded here -->
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="login-btn" style="background: #F1F5F9; color: var(--primary-dark); box-shadow: none;" onclick="closeModal()">Batal</button>
            <button class="login-btn" onclick="assignPosition()">Simpan Perubahan</button>
        </div>
    </div>
</div>

{{ end }}

{{ define "employees_scripts" }}
<script>
    let employees = [];
    let positions = [];

    async function loadData() {
        try {
            employees = await api.get('/admin/employees');
            positions = await api.get('/admin/positions');
            renderEmployees();
            renderPositions();
        } catch (error) {
            console.error(error);
        }
    }

    function renderEmployees(filter = '') {
        const tbody = document.getElementById('employee-table-body');
        const filtered = employees.filter(e => e.name.toLowerCase().includes(filter.toLowerCase()));
        
        tbody.innerHTML = filtered.map(e => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px; display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary-color);">
                        ${e.name.substring(0,2).toUpperCase()}
                    </div>
                    <div>
                        <div style="font-weight: 700;">${e.name}</div>
                        <div style="font-size: 12px; color: #94A3B8;">ID: ${e.id.substring(0,8)}...</div>
                    </div>
                </td>
                <td style="padding: 16px;">
                    <span style="font-weight: 600; color: var(--primary-dark); font-size: 14px;">${e.position_name || 'Belum Diatur'}</span>
                </td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #64748B;">${e.email}</td>
                <td style="padding: 16px;">
                    <span style="padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; ${getStatusStyle(e.status)}">
                        ${e.status}
                    </span>
                </td>
                <td style="padding: 16px;">
                    <div style="display: flex; gap: 8px;">
                        <button onclick="openModal('${e.id}')" title="Set Jabatan" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #EEF2FF; color: #4D64F5; cursor: pointer;"><i class='bx bxs-briefcase'></i></button>
                        <button onclick="resetDevice('${e.id}')" title="Reset Device" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #F8FAFC; color: #64748B; cursor: pointer;"><i class='bx bx-refresh'></i></button>
                        ${e.status === 'ACTIVE' ? 
                            `<button onclick="fireEmployee('${e.id}')" title="Pecat" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #FEF2F2; color: #EF4444; cursor: pointer;"><i class='bx bx-user-minus'></i></button>` :
                            `<button onclick="reactivateEmployee('${e.id}')" title="Reaktivasi" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #F0FDF4; color: #10B981; cursor: pointer;"><i class='bx bx-user-plus'></i></button>`
                        }
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function getStatusStyle(status) {
        if (status === 'ACTIVE') return 'background: #F0FDF4; color: #10B981;';
        if (status === 'PENDING') return 'background: #FFFBEB; color: #F59E0B;';
        if (status === 'FIRED') return 'background: #FEF2F2; color: #EF4444;';
        return 'background: #F1F5F9; color: #94A3B8;';
    }

    function renderPositions() {
        const select = document.getElementById('position-select');
        select.innerHTML = '<option value="">Pilih Jabatan...</option>' + 
            positions.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    function openModal(userId) {
        document.getElementById('target-user-id').value = userId;
        document.getElementById('position-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('position-modal').style.display = 'none';
    }

    async function assignPosition() {
        const userId = document.getElementById('target-user-id').value;
        const positionId = document.getElementById('position-select').value;
        
        if (!positionId) return alert('Silakan pilih jabatan');

        try {
            await api.post('/admin/positions/assign', { user_id: userId, position_id: positionId });
            alert('Jabatan berhasil diatur!');
            closeModal();
            loadData();
        } catch (error) { alert(error.message); }
    }

    async function resetDevice(userId) {
        if (!confirm('Hapus binding perangkat karyawan ini?')) return;
        try {
            await api.post('/admin/reset-device', { user_id: userId });
            alert('Device binding berhasil direset!');
        } catch (error) { alert(error.message); }
    }

    async function fireEmployee(userId) {
        if (!confirm('Apakah Anda yakin ingin memecat karyawan ini?')) return;
        try {
            await api.post('/admin/employees/fire', { user_id: userId });
            alert('Karyawan telah dinonaktifkan!');
            loadData();
        } catch (error) { alert(error.message); }
    }

    async function reactivateEmployee(userId) {
        if (!confirm('Aktifkan kembali karyawan ini?')) return;
        try {
            await api.post('/admin/employees/reactivate', { user_id: userId });
            alert('Karyawan telah diaktifkan kembali!');
            loadData();
        } catch (error) { alert(error.message); }
    }

    document.getElementById('employee-search').addEventListener('input', (e) => {
        renderEmployees(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', loadData);
</script>
{{ end }}
