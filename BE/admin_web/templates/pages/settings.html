<!-- BE/admin_web/templates/pages/settings.html -->
{{ define "settings_content" }}
<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px;">
    
    <!-- Profil Perusahaan -->
    <div class="stat-card" style="padding: 32px;">
        <h2 style="font-weight: 800; font-size: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
            <i class='bx bxs-business' style="color: var(--primary-color);"></i> Profil Perusahaan
        </h2>
        <form id="company-form">
            <div class="form-group">
                <label class="form-label">Nama Perusahaan</label>
                <input type="text" id="company-name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Perusahaan</label>
                <input type="email" id="company-email" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Nomor Telepon</label>
                <input type="text" id="company-phone" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Alamat</label>
                <textarea id="company-address" class="form-input" style="min-height: 100px; resize: vertical;" required></textarea>
            </div>
            <button type="submit" class="login-btn">Simpan Perubahan Perusahaan</button>
        </form>
    </div>

    <!-- Profil Admin & Keamanan -->
    <div style="display: flex; flex-direction: column; gap: 24px;">
        
        <!-- Profil Pribadi -->
        <div class="stat-card" style="padding: 32px;">
            <h2 style="font-weight: 800; font-size: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
                <i class='bx bxs-user-circle' style="color: var(--primary-color);"></i> Profil Pribadi
            </h2>
            <form id="profile-form">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="admin-fullname" class="form-input" required>
                </div>
                <button type="submit" class="login-btn" style="background: #0F172A;">Update Nama</button>
            </form>
        </div>

        <!-- Keamanan Akun -->
        <div class="stat-card" style="padding: 32px;">
            <h2 style="font-weight: 800; font-size: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
                <i class='bx bxs-lock' style="color: #EF4444;"></i> Keamanan Akun
            </h2>
            
            <!-- Ganti Password -->
            <form id="password-form" style="margin-bottom: 32px;">
                <div class="form-group">
                    <label class="form-label">Password Saat Ini</label>
                    <input type="password" id="old-password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input type="password" id="new-password" class="form-input" required>
                </div>
                <button type="submit" class="login-btn" style="background: #EF4444; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);">Ganti Password</button>
            </form>

            <hr style="border: 0; border-top: 1px solid #F1F5F9; margin-bottom: 32px;">

            <!-- Ganti PIN -->
            <form id="pin-form">
                <div class="form-group">
                    <label class="form-label">PIN Baru (6 Digit)</label>
                    <input type="password" id="new-pin" class="form-input" maxlength="6" pattern="\d{6}" placeholder="123456" required>
                </div>
                <button type="submit" class="login-btn" style="background: #F59E0B; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);">Ganti PIN Keamanan</button>
            </form>
        </div>
    </div>
</div>
{{ end }}

{{ define "settings_scripts" }}
<script>
    async function loadSettings() {
        try {
            const company = await api.get('/admin/company');
            const profile = await api.get('/profile');

            // Fill Company Form
            document.getElementById('company-name').value = company.name || '';
            document.getElementById('company-email').value = company.email || '';
            document.getElementById('company-phone').value = company.phone || '';
            document.getElementById('company-address').value = company.address || '';

            // Fill Profile Form
            document.getElementById('admin-fullname').value = profile.name || '';
        } catch (error) { console.error(error); }
    }

    // Company Form Submit
    document.getElementById('company-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            name: document.getElementById('company-name').value,
            email: document.getElementById('company-email').value,
            phone: document.getElementById('company-phone').value,
            address: document.getElementById('company-address').value
        };

        try {
            await api.post('/admin/company', body);
            alert('Profil perusahaan berhasil diperbarui!');
        } catch (error) { alert(error.message); }
    });

    // Profile Form Submit
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('admin-fullname').value;

        try {
            await api.put('/profile', { name });
            localStorage.setItem('user_name', name);
            document.getElementById('admin-name').textContent = name;
            alert('Nama profil berhasil diperbarui!');
        } catch (error) { alert(error.message); }
    });

    // Password Form Submit
    document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const old_password = document.getElementById('old-password').value;
        const new_password = document.getElementById('new-password').value;

        try {
            await api.post('/profile/change-password', { old_password, new_password });
            alert('Password berhasil diubah!');
            e.target.reset();
        } catch (error) { alert(error.message); }
    });

    // PIN Form Submit
    document.getElementById('pin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const new_pin = document.getElementById('new-pin').value;

        try {
            await api.post('/profile/change-pin', { new_pin });
            alert('PIN Keamanan berhasil diubah!');
            e.target.reset();
        } catch (error) { alert(error.message); }
    });

    document.addEventListener('DOMContentLoaded', loadSettings);
</script>
{{ end }}

{{ template "base" . }}
