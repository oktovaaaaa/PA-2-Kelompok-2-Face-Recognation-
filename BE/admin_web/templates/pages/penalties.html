<!-- BE/admin_web/templates/pages/penalties.html -->
{{ define "penalties_content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Manajemen Denda Pelanggaran</h2>
        <button class="login-btn" style="width: auto; padding: 12px 20px; font-size: 14px; display: flex; align-items: center; gap: 8px;" onclick="openCreateModal()">
            <i class='bx bx-plus-circle'></i> Beri Denda Manual
        </button>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">ALASAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">JUMLAH DENDA</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">TANGGAL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="penalty-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <i class='bx bx-error' style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"></i>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada data denda yang tercatat.</div>
    </div>
</div>

<!-- Modal Beri Denda -->
<div id="penalty-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <form id="penalty-form" class="stat-card" style="width: 100%; max-width: 450px; padding: 32px;">
        <h3 style="font-weight: 800; margin-bottom: 24px;">Beri Denda Manual</h3>
        
        <div class="form-group">
            <label class="form-label">Pilih Karyawan</label>
            <select id="penalty-user-id" class="form-input" required></select>
        </div>

        <div class="form-group">
            <label class="form-label">Alasan Pelanggaran</label>
            <input type="text" id="penalty-reason" class="form-input" placeholder="Contoh: Terlambat > 30 menit, Merusak fasilitas, dll" required>
        </div>

        <div class="form-group">
            <label class="form-label">Jumlah Denda (IDR)</label>
            <input type="number" id="penalty-amount" class="form-input" placeholder="10000" required>
        </div>

        <div style="display: flex; gap: 12px;">
            <button type="button" class="login-btn" style="background: #F1F5F9; color: var(--primary-dark); box-shadow: none;" onclick="closeModal()">Batal</button>
            <button type="submit" class="login-btn">Terapkan Denda</button>
        </div>
    </form>
</div>
{{ end }}

{{ define "penalties_scripts" }}
<script>
    let employees = [];

    async function loadData() {
        try {
            const penalties = await api.get('/admin/penalties');
            employees = await api.get('/admin/employees');
            
            renderTable(penalties);
            renderEmployeeSelect();
        } catch (error) { console.error(error); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('penalty-table-body');
        const noData = document.getElementById('no-data');

        if (!data || data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(p => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px;">
                    <div style="font-weight: 700; color: var(--primary-dark);">${p.user_name}</div>
                </td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #64748B;">${p.reason}</td>
                <td style="padding: 16px; font-weight: 800; color: #EF4444;">
                    IDR ${new Intl.NumberFormat('id-ID').format(p.amount)}
                </td>
                <td style="padding: 16px; font-weight: 500; font-size: 13px; color: #94A3B8;">
                    ${new Date(p.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}
                </td>
                <td style="padding: 16px;">
                    <button onclick="deletePenalty('${p.id}')" title="Hapus Denda" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: #FEF2F2; color: #EF4444; cursor: pointer;"><i class='bx bx-trash'></i></button>
                </td>
            </tr>
        `).join('');
    }

    function renderEmployeeSelect() {
        const select = document.getElementById('penalty-user-id');
        select.innerHTML = '<option value="">Pilih Karyawan...</option>' + 
            employees.filter(e => e.status === 'ACTIVE').map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    }

    function openCreateModal() {
        document.getElementById('penalty-user-id').value = '';
        document.getElementById('penalty-reason').value = '';
        document.getElementById('penalty-amount').value = '';
        document.getElementById('penalty-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('penalty-modal').style.display = 'none';
    }

    document.getElementById('penalty-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user_id = document.getElementById('penalty-user-id').value;
        const reason = document.getElementById('penalty-reason').value;
        const amount = parseInt(document.getElementById('penalty-amount').value);
        
        try {
            await api.post('/admin/penalties', { user_id, reason, amount });
            alert('Denda berhasil diterapkan!');
            closeModal();
            loadData();
        } catch (error) { alert(error.message); }
    });

    async function deletePenalty(id) {
        if (!confirm('Hapus pencatatan denda ini?')) return;
        try {
            await api.delete(`/admin/penalties/${id}`);
            alert('Data denda dihapus!');
            loadData();
        } catch (error) { alert(error.message); }
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
{{ end }}

{{ template "base" . }}
