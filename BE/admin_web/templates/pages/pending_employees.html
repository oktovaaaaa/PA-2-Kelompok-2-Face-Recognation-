<!-- BE/admin_web/templates/pages/pending_employees.html -->
{{ define "content" }}
<div class="stat-card" style="margin-bottom: 24px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-weight: 800; font-size: 20px;">Persetujuan Karyawan Baru</h2>
        <div style="font-size: 14px; padding: 6px 12px; background: #FFFBEB; color: #D97706; border-radius: 100px; font-weight: 700;">
            <span id="pending-count">0</span> Menunggu
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #F1F5F9;">
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">CALON KARYAWAN</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">EMAIL</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">TANGGAL DAFTAR</th>
                    <th style="padding: 16px; color: #64748B; font-weight: 700;">AKSI</th>
                </tr>
            </thead>
            <tbody id="pending-table-body">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <div id="no-data" style="display: none; text-align: center; padding: 60px 20px;">
        <div style="font-size: 48px; color: #E2E8F0; margin-bottom: 16px;"><i class='bx bx-user-plus'></i></div>
        <div style="font-weight: 700; color: #94A3B8;">Tidak ada pendaftaran karyawan baru yang menunggu.</div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
    async function loadPending() {
        try {
            const data = await api.get('/admin/pending-employees');
            renderTable(data);
        } catch (error) { console.error(error); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('pending-table-body');
        const count = document.getElementById('pending-count');
        const noData = document.getElementById('no-data');
        
        count.textContent = data.length;
        
        if (data.length === 0) {
            tbody.innerHTML = '';
            noData.style.display = 'block';
            return;
        }

        noData.style.display = 'none';
        tbody.innerHTML = data.map(e => `
            <tr style="border-bottom: 1px solid #F1F5F9;">
                <td style="padding: 16px; display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: #FDE68A; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #D97706;">
                        ${e.name.substring(0,2).toUpperCase()}
                    </div>
                    <div style="font-weight: 700;">${e.name}</div>
                </td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #64748B;">${e.email}</td>
                <td style="padding: 16px; font-weight: 500; font-size: 14px; color: #94A3B8;">${new Date(e.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</td>
                <td style="padding: 16px;">
                    <div style="display: flex; gap: 8px;">
                        <button onclick="approve('${e.id}')" style="padding: 8px 16px; border-radius: 10px; border: none; background: #22C55E; color: white; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px;">
                            <i class='bx bx-check'></i> Terima
                        </button>
                        <button onclick="reject('${e.id}')" style="padding: 8px 16px; border-radius: 10px; border: none; background: #EF4444; color: white; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px;">
                            <i class='bx bx-x'></i> Tolak
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function approve(userId) {
        if (!confirm('Terima karyawan ini?')) return;
        try {
            await api.post('/admin/approve-employee', { user_id: userId });
            alert('Karyawan telah diterima!');
            loadPending();
        } catch (error) { alert(error.message); }
    }

    async function reject(userId) {
        if (!confirm('Tolak pendaftaran ini?')) return;
        try {
            await api.post('/admin/reject-employee', { user_id: userId });
            alert('Pendaftaran telah ditolak!');
            loadPending();
        } catch (error) { alert(error.message); }
    }

    document.addEventListener('DOMContentLoaded', loadPending);
</script>
{{ end }}

{{ template "base" . }}
