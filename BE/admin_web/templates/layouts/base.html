<!-- BE/admin_web/templates/layouts/base.html -->
{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} | Admin Web</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for better icon support -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <div class="logo-icon">ES</div>
                <div class="logo-text">EMPLOYEE<br>SYSTEM</div>
            </div>
            <button class="sidebar-toggle" id="sidebar-collapse">
                <i class='bx bx-menu-alt-left'></i>
            </button>
        </div>

        <div class="nav-menu">
            <a href="/admin-web/dashboard" class="nav-item {{ if eq .active "dashboard" }}active{{ end }}">
                <i class='bx bxs-dashboard'></i>
                <span>Beranda</span>
            </a>
            <a href="/admin-web/leaves" class="nav-item {{ if eq .active "leaves" }}active{{ end }}">
                <i class='bx bxs-edit'></i>
                <span>Perizinan</span>
            </a>
            <a href="/admin-web/payroll" class="nav-item {{ if eq .active "payroll" }}active{{ end }}">
                <i class='bx bxs-wallet'></i>
                <span>Gaji</span>
            </a>
            <a href="/admin-web/employees" class="nav-item {{ if eq .active "employees" }}active{{ end }}">
                <i class='bx bxs-group'></i>
                <span>Karyawan</span>
            </a>
            <a href="/admin-web/attendance-report" class="nav-item {{ if eq .active "attendance" }}active{{ end }}">
                <i class='bx bxs-bar-chart-alt-2'></i>
                <span>Laporan Absensi</span>
            </a>
            <a href="/admin-web/positions" class="nav-item {{ if eq .active "positions" }}active{{ end }}">
                <i class='bx bxs-briefcase'></i>
                <span>Jabatan</span>
            </a>
            <a href="/admin-web/holidays" class="nav-item {{ if eq .active "holidays" }}active{{ end }}">
                <i class='bx bxs-calendar-event'></i>
                <span>Hari Libur</span>
            </a>
            <a href="/admin-web/penalties" class="nav-item {{ if eq .active "penalties" }}active{{ end }}">
                <i class='bx bxs-error-circle'></i>
                <span>Denda</span>
            </a>
            <a href="/admin-web/settings" class="nav-item {{ if eq .active "settings" }}active{{ end }}">
                <i class='bx bxs-cog'></i>
                <span>Pengaturan</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="auth.logout()">
                <i class='bx bx-log-out'></i>
                <span>Keluar</span>
            </button>
        </div>
    </div>

    <div class="main-wrapper" id="main-wrapper">
        <nav class="top-nav">
            <div class="page-title">{{ .title }}</div>
            <div class="top-actions">
                <div class="admin-profile" onclick="window.location.href='/admin-web/settings'">
                    <div class="admin-avatar" id="admin-initials">AD</div>
                    <div class="admin-name" id="admin-name">Admin</div>
                </div>
            </div>
        </nav>

        <div class="content-body animate-in">
            {{ template "content" . }}
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        // Sidebar Toggle Logic
        const sidebar = document.getElementById('sidebar');
        const wrapper = document.getElementById('main-wrapper');
        const collapseBtn = document.getElementById('sidebar-collapse');
        
        collapseBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            wrapper.classList.toggle('full');
            
            // Save state
            localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
        });

        // Restore sidebar state
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            sidebar.classList.add('collapsed');
            wrapper.classList.add('full');
        }

        // Initialize Admin Info
        document.addEventListener('DOMContentLoaded', () => {
            const adminName = localStorage.getItem('user_name') || 'Admin';
            document.getElementById('admin-name').textContent = adminName;
            document.getElementById('admin-initials').textContent = adminName.substring(0, 2).toUpperCase();
        });
    </script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
{{ end }}
